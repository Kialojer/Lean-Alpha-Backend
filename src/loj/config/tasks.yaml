judge_task:
  description: >
    Analyze the following live market payload for {symbol}:
    {market_data}
    
    CRITICAL: Read the EXACT live price from the payload. DO NOT hallucinate.
    
    Calculate a conviction score (0-100). Based on this score, you MUST strictly define 'action' (BUY for Long, SELL for Short), 'leverage', Stop Loss (SL) distance, and Take Profit (TP) distance from the Entry price:
    - IF action is 'SELL' (Short): Stop Loss MUST be calculated HIGHER than Entry (+%), and Take Profit MUST be calculated LOWER than Entry (-%).
    - IF action is 'BUY' (Long): Stop Loss MUST be calculated LOWER than Entry (-%), and Take Profit MUST be calculated HIGHER than Entry (+%).
    - Score >= 75: action = 'BUY', leverage = 6, SL = 5% away, TP = 10% away, allocation_pct = 20
    - Score 50-74: action = 'BUY', leverage = 4, SL = 7% away, TP = 7% away, allocation_pct = 10
    - Score 30-49: action = 'SELL', leverage = 3, SL = 6% away, TP = 8% away, allocation_pct = 10
    - Score < 30: action = 'SELL', leverage = 3, SL = 5% away, TP = 5% away, allocation_pct = 20
    
    Using the CURRENT REAL PRICE as your baseline Entry, calculate the exact numerical values for SL and TP based on the percentage distances defined above.
    
    Your 'rationale' MUST explicitly cite the exact numbers from the payload (including Off-Chain data) and explain the chosen leverage and risk parameters.
  expected_output: "A strict JSON containing action, leverage, allocation_pct, score, trend_bias, current_price, entry, sl, tp, and rationale."
narrate_task:
  description: >
    Take this verified trade setup from the judge:
    {judge_output}
    
    Write a viral, high-conviction X (Crypto Twitter) post. 
    
    CRITICAL RULES:
    1. Output EXACTLY 4-5 lines. NEVER repeat any sentence or line twice.
    2. TONE: You are a "Smart Money Alpha Caller". Be edgy, confident, and use cool crypto slang.
    3. Dynamically adapt to the 'trend_bias'.
    
    FORMAT STRICTLY AS FOLLOWS:
    Line 1: [Explosive Hook with cashtag like $LINK]
    Line 2: 🎯 [Direction (LONG/SHORT)] | Price: $[current_price] | Entry: $[entry_price] | TP: $[take_profit] | SL: $[stop_loss]
    Line 3-4: 🧠 The Alpha: YOU MUST START THIS SENTENCE WITH FUNDING RATE AND OPEN INTEREST DATA! (e.g., "Funding Rate is at -0.01% and OI is massively building up to $10M..."). After citing the derivatives data, mention the RSI or Sentiment to complete the thesis.
    Line 5: [Bold closing thought or warning] + #Crypto tags.
  expected_output: "A highly engaging X post that strictly includes Off-Chain numbers."